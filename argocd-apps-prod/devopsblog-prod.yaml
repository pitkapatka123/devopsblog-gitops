apiVersion: argoproj.io/v1alpha1
kind: Application
metadata:
  name: devopsblog-prod
  namespace: argocd
spec:
  source:
    repoURL: 'https://github.com/valentindodovu51/devopsblog-gitops.git'
    targetRevision: master
    path: prod/devopsblog-prod
  destination:
    server: 'https://kubernetes.default.svc'
    namespace: devopsblog-prod
  project: default
  syncPolicy:
    automated:
      prune: true
      selfHeal: true