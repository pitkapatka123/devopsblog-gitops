name: content_validation

on:
  workflow_dispatch:

permissions:
  contents: read

jobs:
  smoke:
    name: Smoke test dev after a new content was added
    runs-on: ubuntu-24.04

    steps:
      - name: Wait until dev is healthy
        run: |
          echo "Waiting for ${{ vars.DEV_BASE_URL }} to be healthy..."
          curl --fail --retry 30 --retry-all-errors --retry-delay 10 -L "${{ vars.DEV_BASE_URL }}/health"

      - name: Check posts page
        run: |
          curl -fsS -o /dev/null -w "%{http_code}\n" "${{ vars.DEV_BASE_URL }}/posts" | grep -E "^(200|301|302)$"


  validate:
    runs-on: ubuntu-24.04
    needs: smoke
    steps:

      - name: ZAP Baseline Scan (DAST)
        uses: zaproxy/action-baseline@v0.15.0
        with:
          target: "${{ vars.DEV_BASE_URL }}"
          fail_action: true
          allow_issue_writing: false
