apiVersion: apps/v1
kind: Deployment
metadata:
  name: devopsblog
  namespace: devopsblog-prod
spec:
  replicas: 2
  strategy:
    type: RollingUpdate
    rollingUpdate:
      maxSurge: 1
      maxUnavailable: 0
  progressDeadlineSeconds: 180
  revisionHistoryLimit: 3
  minReadySeconds: 5
  selector:
    matchLabels:
      app.kubernetes.io/name: devopsblog
      app.kubernetes.io/instance: devopsblog-prod
  template:
    metadata:
      labels:
        app.kubernetes.io/name: devopsblog
        app.kubernetes.io/instance: devopsblog-prod
    spec:
      serviceAccountName: devopsblog-s3
      securityContext:
        runAsNonRoot: true
        runAsUser: 1000
      containers:
        - name: devopsblog
          image: 648835056994.dkr.ecr.eu-central-1.amazonaws.com/devops-blog@sha256:a2fe468a7891cea16068f6d912a09b409ded0fc0ad7967365824be63a8dfa9ea
          imagePullPolicy: IfNotPresent
          env:
            - name: POSTS_S3_BUCKET
              value: devopsblog-content
            - name: POSTS_S3_PREFIX
              value: prod
          ports:
            - name: http
              containerPort: 8000
          readinessProbe:
            httpGet:
              path: /health
              port: http
            initialDelaySeconds: 5
            periodSeconds: 10
            timeoutSeconds: 2
            failureThreshold: 3
          livenessProbe:
            httpGet:
              path: /health
              port: http
            initialDelaySeconds: 21
            periodSeconds: 20
            timeoutSeconds: 2
            failureThreshold: 3
          securityContext:
            allowPrivilegeEscalation: false
            readOnlyRootFilesystem: false
            capabilities:
              drop:
                - ALL
          resources:
            requests:
              cpu: 50m
              memory: 64Mi
            limits:
              cpu: 250m
              memory: 256Mi
      terminationGracePeriodSeconds: 15
