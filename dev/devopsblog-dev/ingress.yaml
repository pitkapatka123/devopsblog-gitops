apiVersion: networking.k8s.io/v1
kind: Ingress
metadata:
  name: devopsblog
  namespace: devopsblog-dev
  annotations:
    kubernetes.io/ingress.class: alb
    alb.ingress.kubernetes.io/scheme: internet-facing
    alb.ingress.kubernetes.io/target-type: ip
    alb.ingress.kubernetes.io/healthcheck-path: /health
    alb.ingress.kubernetes.io/certificate-arn: arn:aws:acm:eu-central-1:648835056994:certificate/29868567-4598-421f-a13c-42ecb1289a1b
    alb.ingress.kubernetes.io/listen-ports: '[{"HTTP":80},{"HTTPS":443}]'

spec:
  rules:
    - http:
        paths:
          - path: /
            pathType: Prefix
            backend:
              service:
                name: devopsblog
                port:
                  number: 8000
