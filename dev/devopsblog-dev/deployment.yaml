apiVersion: apps/v1
kind: Deployment
metadata:
  name: devopsblog
  namespace: devopsblog-dev
spec:
  replicas: 2
  strategy:
    type: RollingUpdate
    rollingUpdate:
      maxSurge: 1
      maxUnavailable: 0
  progressDeadlineSeconds: 180
  revisionHistoryLimit: 3
  minReadySeconds: 5
  selector:
    matchLabels:
      app.kubernetes.io/name: devopsblog
      app.kubernetes.io/instance: devopsblog-dev
  template:
    metadata:
      labels:
        app.kubernetes.io/name: devopsblog
        app.kubernetes.io/instance: devopsblog-dev
    spec:
      serviceAccountName: devopsblog-s3
      securityContext:
        runAsNonRoot: true
        runAsUser: 1000
      containers:
        - name: devopsblog
          image: 944765969336.dkr.ecr.eu-west-1.amazonaws.com/devops-blog@sha256:9f20f1cea0dc5959ed76ebe2bdd243ac2c19eb3763a58df97018927839caca8b
          imagePullPolicy: IfNotPresent
          env:
            - name: POSTS_S3_BUCKET
              value: devopsblog-content2
            - name: POSTS_S3_PREFIX
              value: dev
          ports:
            - name: http
              containerPort: 8000
          readinessProbe:
            httpGet:
              path: /health
              port: http
            initialDelaySeconds: 5
            periodSeconds: 10
            timeoutSeconds: 2
            failureThreshold: 3
          livenessProbe:
            httpGet:
              path: /health
              port: http
            initialDelaySeconds: 21
            periodSeconds: 20
            timeoutSeconds: 2
            failureThreshold: 3
          securityContext:
            allowPrivilegeEscalation: false
            readOnlyRootFilesystem: false
            capabilities:
              drop:
                - ALL
          resources:
            requests:
              cpu: 50m
              memory: 64Mi
            limits:
              cpu: 250m
              memory: 256Mi
      terminationGracePeriodSeconds: 15
